# Ingress for Traefik (k3s default). Change host to whatever you set in
# WEBHOOK_BASE_URL — both MUST match for Telegram to reach the bot.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bot
  annotations:
    # Traefik automatically terminates TLS if you configure cert-manager.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  tls:
    - hosts: ["example.f8f.dev"]
      secretName: bot-tls
  rules:
    - host: example.f8f.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bot
                port: { name: http }
