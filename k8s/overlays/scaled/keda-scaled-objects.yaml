# KEDA ScaledObjects + TriggerAuthentication for queue-depth autoscaling.
#
# Requires KEDA v2.x installed in the cluster (https://keda.sh/docs/deploy/).
# The webhook-receiver uses a plain CPU HPA (webhook-receiver-hpa.yaml) —
# it's stateless and CPU-bound, so CPU is the right signal there.
#
# The update-consumer StatefulSet is NOT auto-scaled here: its replica
# count MUST equal UPDATES_SHARDS (see update-consumer.yaml + §5 in
# MIGRATION_V2_TO_V3.md). Scaling it means re-sharding — an operator-
# driven maintenance window, not an autoscaler decision.
---
# TriggerAuthentication — supplies the RabbitMQ management API URL to
# KEDA's rabbitmq scaler. Uses the same ConfigMap value the app uses.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-trigger-auth
spec:
  env:
    - parameter: host
      name: RABBITMQ_HTTP_URL
      containerName: worker
---
# worker-delivery: scale on delivery_queue depth.
# Min 1 (there's always delivery work to drain). Max 3 — more replicas
# don't help because the Redis token-bucket rate-limiter is the true
# bottleneck (25 msg/s global, 1/s per-chat).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-delivery
spec:
  scaleTargetRef:
    kind: Deployment
    name: worker-delivery
  minReplicaCount: 1
  maxReplicaCount: 3
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: delivery_queue
        mode: QueueLength
        value: "50"
      authenticationRef:
        name: rabbitmq-trigger-auth
---
# worker-tasks: scale on tasks_queue depth.
# Min 1, max 8. These are general async tasks (smoke, future LLM jobs)
# with no ordering constraint.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-tasks
spec:
  scaleTargetRef:
    kind: Deployment
    name: worker-tasks
  minReplicaCount: 1
  maxReplicaCount: 8
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: tasks_queue
        mode: QueueLength
        value: "20"
      authenticationRef:
        name: rabbitmq-trigger-auth
