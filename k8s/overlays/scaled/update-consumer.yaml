# Update-consumer StatefulSet (v3 Phase 3)
#
# One pod per shard — each consumes exactly one ``updates.shard.<i>``
# queue. Per-chat ordering is preserved by the combination of:
#   1. RabbitMQ x-consistent-hash exchange (same chat_id → same shard)
#   2. ``--concurrency=1`` and ``--prefetch-multiplier=1`` (no parallel
#      dispatch within a shard; only one update in-flight at a time)
#
# UPDATES_SHARDS in the ConfigMap MUST equal ``spec.replicas``; mismatch
# silently orphans shard queues (extra pods consume nothing; missing
# pods queue updates forever).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: update-consumer
spec:
  serviceName: update-consumer
  # Bump in lockstep with UPDATES_SHARDS. 4 here matches the overlay's
  # UPDATES_SHARDS=4 literal; 16 in prod is a reasonable ceiling.
  replicas: 4
  podManagementPolicy: Parallel
  selector:
    matchLabels: { app: update-consumer }
  template:
    metadata:
      labels: { app: update-consumer }
    spec:
      containers:
        - name: consumer
          image: tg-business-bot:latest
          imagePullPolicy: IfNotPresent
          # The pod's ordinal (0..N-1) from the StatefulSet name is used
          # as the shard index, so pod ``update-consumer-0`` consumes
          # ``updates.shard.0``, etc.
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Extract the ordinal from the StatefulSet pod name.
              ORDINAL="${HOSTNAME##*-}"
              exec celery -A src.tasks.celery_app worker \
                   -Q "updates.shard.${ORDINAL}" \
                   --concurrency=1 \
                   --prefetch-multiplier=1 \
                   --loglevel=INFO
          envFrom:
            - configMapRef: { name: tg-bot-config }
            - secretRef: { name: tg-bot-secrets }
          volumeMounts:
            - { name: data, mountPath: /app/data }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 768Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            # Shared SQLite still lives on an RWO PVC — Phase 4 moves
            # this to Postgres, at which point the volumeMount goes.
            claimName: tg-bot-data
---
apiVersion: v1
kind: Service
metadata:
  name: update-consumer
spec:
  clusterIP: None          # headless, just for stable DNS for the StatefulSet
  selector: { app: update-consumer }
  ports:
    - { name: dummy, port: 80, targetPort: 80 }
