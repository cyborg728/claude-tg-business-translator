# Public-facing Ingress — Telegram POSTs to https://<host>/<bot_token>.
# The receiver Service fronts N stateless pods; the bot Deployment is
# reached internally via its own Service (Phase 2).
#
# Host MUST match WEBHOOK_BASE_URL in the configmap.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webhook-receiver
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  tls:
    - hosts: ["example.f8f.dev"]
      secretName: webhook-receiver-tls
  rules:
    - host: example.f8f.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webhook-receiver
                port: { name: http }
