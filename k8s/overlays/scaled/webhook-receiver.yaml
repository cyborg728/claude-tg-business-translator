apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
spec:
  # Stateless — scale freely. The HPA in webhook-receiver-hpa.yaml drives
  # this at runtime based on CPU.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: webhook-receiver }
  template:
    metadata:
      labels: { app: webhook-receiver, mode: receiver }
    spec:
      containers:
        - name: receiver
          image: tg-business-bot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py"]
          env:
            - name: MODE
              value: receiver
          envFrom:
            - configMapRef: { name: tg-bot-config }
            - secretRef: { name: tg-bot-secrets }
          ports:
            - { name: http, containerPort: 8080 }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
