apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tg-bot

# "Scaled" overlay — v3 Phases 2 + 3.
#
# Topology shipped in this overlay:
#   Telegram ─HTTPS─▶ Ingress ─▶ webhook-receiver (N replicas, stateless)
#                                       │ publish(update, key=chat_id)
#                                       ▼
#                               RabbitMQ x-consistent-hash exchange "updates"
#                                       │
#                               ┌───────┴───────┐
#                               ▼               ▼
#                      updates.shard.0 … updates.shard.{N-1}   (durable)
#                               │               │
#                               ▼               ▼
#                          update-consumer-0 … update-consumer-{N-1}
#                          (StatefulSet, one Celery worker per shard,
#                           concurrency=1, prefetch=1 — preserves
#                           per-chat ordering)
#
# UPDATES_SHARDS in the ConfigMap MUST equal the StatefulSet replica
# count (see update-consumer.yaml). Keep them in sync when scaling.
resources:
  - ../../base
  - webhook-receiver.yaml
  - webhook-receiver-service.yaml
  - webhook-receiver-ingress.yaml
  - webhook-receiver-hpa.yaml
  - update-consumer.yaml
  - keda-scaled-objects.yaml
  - prometheus-monitors.yaml

configMapGenerator:
  - name: tg-bot-config
    behavior: merge
    literals:
      - MODE=receiver
      - WEBHOOK_BASE_URL=https://example.f8f.dev
      # Phase-3 routing: named x-consistent-hash exchange, N shards.
      - UPDATES_EXCHANGE=updates
      - UPDATES_SHARDS=4

generatorOptions:
  disableNameSuffixHash: true
