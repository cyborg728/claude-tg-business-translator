apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot
spec:
  # Polling = exactly one replica; two pollers would fight over long-polls.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: bot }
  template:
    metadata:
      labels: { app: bot, mode: polling }
    spec:
      containers:
        - name: bot
          image: tg-business-bot:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main.py"]
          envFrom:
            - configMapRef: { name: tg-bot-config }
            - secretRef: { name: tg-bot-secrets }
          volumeMounts:
            - { name: data, mountPath: /app/data }
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { cpu: 1, memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tg-bot-data
