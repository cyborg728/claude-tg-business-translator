# Service and Ingress — only needed when MODE=webhook.
#
# The bot listens on port 8080 inside the container.  Telegram requires HTTPS
# on port 443 (or 8443 / 88 / 8080 with a self-signed cert).  The recommended
# approach is to terminate TLS at the Ingress controller (e.g. traefik + cert-manager).
---
apiVersion: v1
kind: Service
metadata:
  name: tg-business-translator
  namespace: tg-translator
  labels:
    app: tg-business-translator
spec:
  selector:
    app: tg-business-translator
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tg-business-translator
  namespace: tg-translator
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - tg.f-f.dev
      secretName: tg-translator-tls
  rules:
    - host: tg.f-f.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tg-business-translator
                port:
                  name: http
