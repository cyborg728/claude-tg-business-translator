apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-delivery
spec:
  # Keep this at 1 — rate-limit budget is enforced per-worker via Redis, but
  # a single delivery worker keeps the math simple and avoids double-sending.
  replicas: 1
  selector:
    matchLabels: { app: worker-delivery }
  template:
    metadata:
      labels: { app: worker-delivery }
    spec:
      containers:
        - name: worker
          image: tg-business-bot:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - src.tasks.celery_app
            - worker
            - -Q
            - delivery_queue
            - --loglevel=INFO
            - --concurrency=2
          envFrom:
            - configMapRef: { name: tg-bot-config }
            - secretRef: { name: tg-bot-secrets }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
