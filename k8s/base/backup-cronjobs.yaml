# Daily backups for SQLite DB, Postgres DB, and RabbitMQ definitions.
# All land on the tg-bot-backups PVC; rotate with the included `find -mtime`.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-sqlite
spec:
  schedule: "15 2 * * *"           # 02:15 UTC every day
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sqlite-backup
              image: alpine:3.20
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  apk add --no-cache sqlite
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  OUT=/backup/sqlite-$TS.db
                  echo "Backing up $DATABASE_PATH → $OUT"
                  sqlite3 "$DATABASE_PATH" ".backup '$OUT'"
                  gzip -9 "$OUT"
                  # Keep last 14 daily snapshots
                  find /backup -name 'sqlite-*.db.gz' -mtime +14 -delete
              envFrom:
                - configMapRef: { name: tg-bot-config }
              volumeMounts:
                - { name: data, mountPath: /app/data }
                - { name: backup, mountPath: /backup }
          volumes:
            - { name: data, persistentVolumeClaim: { claimName: tg-bot-data } }
            - { name: backup, persistentVolumeClaim: { claimName: tg-bot-backups } }
---
# Postgres backup — enabled after cutover to DATABASE_BACKEND=postgres.
# While still on SQLite, suspend this job: `kubectl patch cronjob backup-postgres -p '{"spec":{"suspend":true}}'`
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-postgres
spec:
  schedule: "45 2 * * *"           # 02:45 UTC every day (after SQLite + before RabbitMQ)
  suspend: true                    # flip to false after Postgres cutover
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              image: postgres:16-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  OUT=/backup/postgres-$TS.dump
                  echo "Backing up Postgres → $OUT"
                  pg_dump -Fc -h "${POSTGRES_HOST:-postgres}" -p "${POSTGRES_PORT:-5432}" -U "$POSTGRES_USER" -d "$POSTGRES_DB" > "$OUT"
                  gzip -9 "$OUT"
                  # Keep last 30 daily dumps
                  find /backup -name 'postgres-*.dump.gz' -mtime +30 -delete
              envFrom:
                - configMapRef: { name: tg-bot-config }
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef: { name: tg-bot-secrets, key: POSTGRES_USER }
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef: { name: tg-bot-secrets, key: POSTGRES_DB }
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef: { name: tg-bot-secrets, key: POSTGRES_PASSWORD }
              volumeMounts:
                - { name: backup, mountPath: /backup }
          volumes:
            - { name: backup, persistentVolumeClaim: { claimName: tg-bot-backups } }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-rabbitmq
spec:
  schedule: "30 2 * * *"           # 02:30 UTC every day
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rabbitmq-backup
              image: curlimages/curl:8.10.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  OUT=/backup/rabbitmq-$TS.json
                  echo "Exporting RabbitMQ definitions → $OUT"
                  curl -sSf -u guest:guest \
                    http://rabbitmq:15672/api/definitions > "$OUT"
                  gzip -9 "$OUT"
                  # Keep last 30 days of RabbitMQ definitions
                  find /backup -name 'rabbitmq-*.json.gz' -mtime +30 -delete
              volumeMounts:
                - { name: backup, mountPath: /backup }
          volumes:
            - { name: backup, persistentVolumeClaim: { claimName: tg-bot-backups } }
