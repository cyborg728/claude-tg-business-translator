apiVersion: v1
kind: ConfigMap
metadata:
  name: tg-bot-config
data:
  # ── Bot mode (overlays override this) ───────────────────────────────────────
  MODE: "polling"

  # ── i18n ────────────────────────────────────────────────────────────────────
  DEFAULT_LOCALE: "en"

  # ── Database ────────────────────────────────────────────────────────────────
  # Flip to "postgres" after cutover (Phase 4.3 in MIGRATION_V2_TO_V3.md).
  DATABASE_BACKEND: "sqlite"
  DATABASE_PATH: "/app/data/bot.db"
  # POSTGRES_DSN is built from the Secret values at runtime by the app's
  # Settings class. The sync DSN for Alembic / migration scripts is derived
  # automatically (asyncpg→psycopg). The host below matches the in-cluster
  # Service name from postgres.yaml; override in managed-postgres overlay.
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"

  # ── RabbitMQ / Celery ───────────────────────────────────────────────────────
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672//"
  RABBITMQ_HTTP_URL: "http://guest:guest@rabbitmq:15672"
  QUEUE_TASKS: "tasks_queue"
  QUEUE_DELIVERY: "delivery_queue"

  # ── Redis ───────────────────────────────────────────────────────────────────
  REDIS_URL: "redis://redis:6379/0"
  REDIS_SAVE_TTL: "3600"

  # ── Delivery rate-limit ─────────────────────────────────────────────────────
  DELIVERY_RATE_PER_SECOND: "25"
  DELIVERY_RATE_PER_CHAT: "1"

  # ── Webhook (overrideable via overlay + Ingress host) ───────────────────────
  WEBHOOK_BASE_URL: "https://example.f8f.dev"
  WEBHOOK_PORT: "8080"
