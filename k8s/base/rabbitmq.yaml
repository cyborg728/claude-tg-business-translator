apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-plugins
data:
  # ``rabbitmq_consistent_hash_exchange`` is required by the Phase-3 update
  # routing (receiver → hash-exchange → N shard queues preserving per-chat
  # ordering). The management plugin is kept for ops / backup CronJob.
  enabled_plugins: |
    [rabbitmq_management,rabbitmq_consistent_hash_exchange].
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: rabbitmq }
  template:
    metadata:
      labels: { app: rabbitmq }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          ports:
            - { containerPort: 5672, name: amqp }
            - { containerPort: 15672, name: management }
          env:
            - { name: RABBITMQ_DEFAULT_USER, value: "guest" }
            - { name: RABBITMQ_DEFAULT_PASS, value: "guest" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/rabbitmq }
            - { name: plugins, mountPath: /etc/rabbitmq/enabled_plugins, subPath: enabled_plugins }
          readinessProbe:
            exec: { command: ["rabbitmq-diagnostics", "-q", "ping"] }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rabbitmq-data
        - name: plugins
          configMap:
            name: rabbitmq-plugins
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector: { app: rabbitmq }
  ports:
    - { name: amqp, port: 5672, targetPort: 5672 }
    - { name: management, port: 15672, targetPort: 15672 }
