# One-shot Alembic upgrade. Re-create to re-run.
# Works for both SQLite and Postgres — the dual-dialect Alembic chain
# (0001 for SQLite, 0002 for Postgres) is selected by DATABASE_BACKEND.
# For Postgres cutover: ensure this job runs BEFORE scaling up workers.
apiVersion: batch/v1
kind: Job
metadata:
  name: tg-bot-migrate
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: alembic
          image: tg-business-bot:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: { name: tg-bot-config }
            - secretRef: { name: tg-bot-secrets }
