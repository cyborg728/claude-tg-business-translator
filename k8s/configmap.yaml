apiVersion: v1
kind: ConfigMap
metadata:
  name: tg-translator-config
  namespace: tg-translator
data:
  # Gemini model name.
  GEMINI_MODEL: "gemini-2.0-flash"

  # ISO 639-1 code of the language the owner writes in.
  OWNER_LANGUAGE: "ru"

  # Bot mode: "polling" or "webhook".
  # Use "polling" for simplicity (only 1 replica needed).
  # Use "webhook" when you expose the bot via an Ingress.
  MODE: "polling"

  # Public URL for webhook mode (no trailing slash).
  # Only used when MODE=webhook.
  WEBHOOK_URL: "https://example.com"

  # Port the bot listens on inside the container.
  WEBHOOK_PORT: "8080"

  # Path inside the container for the SQLite database file.
  DATABASE_PATH: "data/bot.db"

  # Bot interface language: "en" or "ru".
  LOCALE: "ru"
