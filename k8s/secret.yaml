# IMPORTANT: Replace the placeholder values with real base64-encoded secrets.
# Generate with: echo -n 'your-value' | base64
#
# Never commit a file with real secrets to version control.
# Consider using Sealed Secrets, External Secrets Operator, or Vault instead.
apiVersion: v1
kind: Secret
metadata:
  name: tg-translator-secret
  namespace: tg-translator
type: Opaque
data:
  # echo -n '1234567890:AAExxxxxxxxxxxxxxxx' | base64
  TELEGRAM_BOT_TOKEN: REPLACE_WITH_BASE64_ENCODED_TOKEN

  # echo -n '123456789' | base64
  OWNER_CHAT_ID: REPLACE_WITH_BASE64_ENCODED_CHAT_ID

  # echo -n 'AIzaSy...' | base64
  GEMINI_API_KEY: REPLACE_WITH_BASE64_ENCODED_GEMINI_KEY

  # echo -n 'my-random-secret-token' | base64
  WEBHOOK_SECRET_TOKEN: REPLACE_WITH_BASE64_ENCODED_WEBHOOK_SECRET
