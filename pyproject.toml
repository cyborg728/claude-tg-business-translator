[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "-q",
]
filterwarnings = [
    "error",
    # Third-party deprecation noise we can't control.
    "ignore::DeprecationWarning:telegram.*",
    "ignore::DeprecationWarning:celery.*",
    "ignore::DeprecationWarning:kombu.*",
    # fluent.runtime opens FTL files via FileIO and relies on GC to close them.
    "ignore::ResourceWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.coverage.run]
branch = true
source = ["src"]
omit = [
    "src/bot/runner.py",
    "main.py",
]

[tool.coverage.report]
skip_empty = true
show_missing = true
precision = 1
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
